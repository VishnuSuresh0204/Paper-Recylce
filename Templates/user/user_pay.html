{% extends "user/common_user.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="row g-0">

                    <!-- LEFT SIDE -->
                    <div class="col-md-5 bg-light p-4 p-lg-5">
                        <h4 class="fw-bold mb-4">Order Summary</h4>

                        <div class="mb-4">
                            <label class="text-muted small fw-bold mb-1">Request Details</label>
                            <div class="d-flex justify-content-between mb-2">
                                <span>#{{ waste_request.id }}</span>
                                <span class="badge bg-success">{{ waste_request.status }}</span>
                            </div>
                            <p class="text-muted small">{{ waste_request.name }}</p>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">
                            <strong>Total</strong>
                            <h4 class="text-success">₹{{ waste_request.amount }}</h4>
                        </div>
                    </div>

                    <!-- RIGHT SIDE -->
                    <div class="col-md-7 p-4 p-lg-5 bg-white">

                        <h4 class="fw-bold mb-4">Payment Details</h4>

                        <form id="paymentForm" method="POST" action="/userpay/">
                            {% csrf_token %}
                            <input type="hidden" name="id" value="{{ waste_request.id }}">

                            <!-- NAME -->
                            <div class="mb-3">
                                <label class="fw-bold">Name on Card</label>
                                <input id="name" type="text" class="form-control" required>
                            </div>

                            <!-- CARD -->
                            <div class="mb-3">
                                <label class="fw-bold">Card Number</label>
                                <input id="card" type="text" maxlength="19"
                                    class="form-control" placeholder="0000 0000 0000 0000" required>
                            </div>

                            <!-- EXPIRY + CVV -->
                            <div class="row">
                                <div class="col-7">
                                    <label class="fw-bold">Expiry</label>
                                    <input id="expiry" type="text" maxlength="5"
                                        class="form-control" placeholder="MM/YY" required>
                                </div>

                                <div class="col-5">
                                    <label class="fw-bold">CVV</label>
                                    <input id="cvv" type="password" maxlength="4"
                                        class="form-control" required>
                                </div>
                            </div>

                            <button class="btn btn-success w-100 mt-4">Pay Now</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

// ALLOW ONLY NUMBERS (CARD + CVV)
document.getElementById("card").addEventListener("input", function() {
    this.value = this.value.replace(/\D/g, "").replace(/(.{4})/g, "$1 ").trim();
});

document.getElementById("cvv").addEventListener("input", function() {
    this.value = this.value.replace(/\D/g, "");
});

// EXPIRY FORMAT MM/YY
document.getElementById("expiry").addEventListener("input", function() {
    let val = this.value.replace(/\D/g, "");
    if (val.length >= 3) {
        this.value = val.slice(0,2) + "/" + val.slice(2,4);
    } else {
        this.value = val;
    }
});

// LUHN CHECK
function validateCard(card) {
    let num = card.replace(/\s/g, "");
    let sum = 0, double = false;

    for (let i = num.length - 1; i >= 0; i--) {
        let digit = parseInt(num[i]);

        if (double) {
            digit *= 2;
            if (digit > 9) digit -= 9;
        }

        sum += digit;
        double = !double;
    }

    return sum % 10 === 0;
}

// VALIDATION
document.getElementById("paymentForm").addEventListener("submit", function(e) {

    let valid = true;

    const card = document.getElementById("card");
    const expiry = document.getElementById("expiry");
    const cvv = document.getElementById("cvv");
    const name = document.getElementById("name");

    // RESET
    [card, expiry, cvv, name].forEach(el => el.classList.remove("is-invalid"));

    // CARD
    if (!validateCard(card.value) || card.value.replace(/\s/g,'').length !== 16) {
        card.classList.add("is-invalid");
        valid = false;
    }

    // EXPIRY
    const parts = expiry.value.split("/");
    if (parts.length !== 2) {
        expiry.classList.add("is-invalid");
        valid = false;
    } else {
        let mm = parseInt(parts[0]);
        let yy = parseInt(parts[1]);

        const now = new Date();
        const cYear = now.getFullYear() % 100;
        const cMonth = now.getMonth() + 1;

        if (mm < 1 || mm > 12 || yy < cYear || (yy === cYear && mm < cMonth)) {
            expiry.classList.add("is-invalid");
            valid = false;
        }
    }

    // CVV
    if (!/^\d{3,4}$/.test(cvv.value)) {
        cvv.classList.add("is-invalid");
        valid = false;
    }

    // NAME
    if (!/^[A-Za-z\s]{3,}$/.test(name.value)) {
        name.classList.add("is-invalid");
        valid = false;
    }

    if (!valid) {
        e.preventDefault();
    }

});

</script>

<style>
.is-invalid {
    border: 2px solid red !important;
}
</style>

{% endblock %}
