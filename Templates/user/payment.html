```html
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Payment</title>

  <style>
    body {
      font-family: Arial;
      background: #E3F2FD;
    }

    .container {
      width: 400px;
      margin: 60px auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    input:focus {
      border-color: #2962FF;
      outline: none;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2962FF;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0039CB;
    }

    .error {
      border-color: red !important;
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>💳 Payment</h2>

    <form id="paymentForm">

      <!-- CARD NUMBER -->
      <label>Card Number</label>
      <div class="row card-number-field">
        <input type="text" maxlength="4" required>
        <input type="text" maxlength="4" required>
        <input type="text" maxlength="4" required>
        <input type="text" maxlength="4" required>
      </div>

      <!-- EXPIRY -->
      <label>Expiry Date</label>
      <div class="row">
        <input id="exp_mm" type="text" maxlength="2" placeholder="MM" required>
        <input id="exp_yy" type="text" maxlength="2" placeholder="YY" required>
      </div>

      <!-- CVC -->
      <label>CVC</label>
      <input id="cvc" type="password" maxlength="4" required>

      <!-- NAME -->
      <label>Cardholder Name</label>
      <input id="name" type="text" placeholder="CARDHOLDER NAME" required>

      <button type="submit">💳 Pay Now</button>

    </form>
  </div>

  <script>

    // ALLOW ONLY NUMBERS
    document.querySelectorAll(".card-number-field input, #exp_mm, #exp_yy, #cvc")
      .forEach(input => {
        input.addEventListener("input", () => {
          input.value = input.value.replace(/\D/g, "");
        });
      });

    // AUTO MOVE CARD INPUT
    document.querySelectorAll(".card-number-field input").forEach((input, i, arr) => {
      input.addEventListener("input", () => {
        if (input.value.length === 4 && arr[i + 1]) {
          arr[i + 1].focus();
        }
      });
    });

    // LUHN CHECK
    function validateCardNumber(number) {
      let sum = 0, double = false;

      for (let i = number.length - 1; i >= 0; i--) {
        let digit = parseInt(number[i]);

        if (double) {
          digit *= 2;
          if (digit > 9) digit -= 9;
        }

        sum += digit;
        double = !double;
      }

      return sum % 10 === 0;
    }

    // VALIDATION
    document.getElementById("paymentForm").addEventListener("submit", function (e) {

      let valid = true;

      // RESET ERRORS
      document.querySelectorAll("input").forEach(i => i.classList.remove("error"));

      const inputs = document.querySelectorAll(".card-number-field input");
      let cardNumber = "";

      inputs.forEach(input => {
        if (input.value.length !== 4) {
          input.classList.add("error");
          valid = false;
        }
        cardNumber += input.value;
      });

      if (cardNumber.length !== 16 || !validateCardNumber(cardNumber)) {
        alert("Invalid card number");
        valid = false;
      }

      // EXPIRY
      const mm = document.getElementById("exp_mm");
      const yy = document.getElementById("exp_yy");

      if (mm.value === "" || yy.value === "") {
        mm.classList.add("error");
        yy.classList.add("error");
        alert("Enter expiry date");
        valid = false;
      }

      const month = parseInt(mm.value);
      const year = parseInt(yy.value);

      if (month < 1 || month > 12) {
        mm.classList.add("error");
        alert("Invalid month");
        valid = false;
      }

      const now = new Date();
      const currentYear = now.getFullYear() % 100;
      const currentMonth = now.getMonth() + 1;

      if (year < currentYear || (year === currentYear && month < currentMonth)) {
        yy.classList.add("error");
        alert("Card expired");
        valid = false;
      }

      // CVC
      const cvc = document.getElementById("cvc");
      if (cvc.value.length < 3 || cvc.value.length > 4) {
        cvc.classList.add("error");
        alert("Invalid CVC");
        valid = false;
      }

      // NAME
      const name = document.getElementById("name");
      if (!/^[A-Za-z\s]{3,}$/.test(name.value)) {
        name.classList.add("error");
        alert("Invalid name");
        valid = false;
      }

      if (!valid) {
        e.preventDefault();
      }

    });

  </script>

</body>

</html>
