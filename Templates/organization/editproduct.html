{% extends "organization/common_trash.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-dark text-white text-center py-3 rounded-top-4">
                    <h3 class="mb-0">Edit Product</h3>
                </div>
                <div class="card-body p-4">
                    <form action="" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Product Name</label>
                            <input type="text" name="product_name" class="form-control"
                                value="{{ product.product_name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Description</label>
                            <textarea name="product_description" class="form-control"
                                rows="4">{{ product.description }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Price ($)</label>
                            <input type="number" name="price" class="form-control" step="0.01"
                                value="{{ product.price }}" required>
                        </div>
                        <div class="mb-3 text-center">
                            <label class="form-label fw-bold d-block">Current Image</label>
                            <img src="{{ product.image.url }}" alt="{{ product.product_name }}"
                                class="img-thumbnail mb-2" style="max-height: 150px;">
                            <input type="file" name="image" class="form-control">
                            <small class="text-muted">Leave empty to keep current image</small>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-dark btn-lg">Update Product</button>
                            <a href="/productlist/" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
