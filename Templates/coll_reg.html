{% extends "common.html" %}

{% block content %}
<style>
    .contact-one__form-input-box input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        background-color: antiquewhite;
        box-sizing: border-box;
    }

    .contact-one__form-input-box input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }
</style>

<br>
<h1 style="text-align: center;">Waste Collector Register Form</h1>

<section class="contact-one contact-page">
    <div class="container" style="margin-left: 30%;">
        <div class="col-xl-6 col-lg-6">
            <div class="contact-one__right">

                <form method="POST" enctype="multipart/form-data" onsubmit="return validateForm()">
                    {% csrf_token %}
                    <div class="row">

                        <!-- First Name -->
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input 
                                    type="text" 
                                    name="firstname" 
                                    placeholder="First Name" 
                                    required
                                    pattern="[A-Za-z]{2,}"
                                    title="Only letters allowed (min 2 characters)"
                                >
                            </div>
                        </div>

                        <!-- Last Name -->
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input 
                                    type="text" 
                                    name="lastname" 
                                    placeholder="Last Name" 
                                    required
                                    pattern="[A-Za-z]{1,}"
                                    title="Only letters allowed"
                                >
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input 
                                    type="email" 
                                    name="email"
                                    placeholder="Email Address"
                                    required
                                    pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$"
                                    title="Only Gmail allowed (example@gmail.com)"
                                    oninvalid="this.setCustomValidity('Enter a valid Gmail address')"
                                    oninput="this.setCustomValidity('')"
                                >
                            </div>
                        </div>

                        <!-- Organizer Selection -->
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <select name="organizer_id" required class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; background-color: antiquewhite;">
                                    <option value="" disabled selected>Select Organizer</option>
                                    {% for org in organizers %}
                                        <option value="{{ org.id }}">{{ org.firstname }} {{ org.lastname }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <!-- ID Proof Upload -->
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input 
                                    type="file" 
                                    name="idproof" 
                                    id="idproof"
                                    required
                                    accept=".jpg,.jpeg,.png,.pdf"
                                >
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input 
                                    type="password" 
                                    name="password" 
                                    id="password"
                                    placeholder="Password" 
                                    required
                                    pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@#$%^&+=]{6,}$"
                                    title="Min 6 characters, include letters & numbers"
                                >
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="col-xl-6 col-lg-6 col-md-6">
                            <div class="contact-one__form-input-box">
                                <input 
                                    type="password" 
                                    id="confirm_password"
                                    placeholder="Confirm Password" 
                                    required
                                >
                            </div>
                        </div>

                    </div>

                    <!-- Submit Button -->
                    <div class="row">
                        <div class="col-xl-12">
                            <div class="contact-one__btn-box">
                                <button type="submit" class="thm-btn contact-one__btn">
                                    Register
                                </button>
                            </div>
                        </div>
                    </div>

                </form>

            </div>
        </div>
    </div>
</section>

<!-- JS Validation -->
<script>
function validateForm() {

    // Password match check
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirm_password").value;

    if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return false;
    }

    // File validation
    let fileInput = document.getElementById("idproof");
    let file = fileInput.files[0];

    if (file) {
        let allowedTypes = ["image/jpeg", "image/png", "application/pdf"];
        if (!allowedTypes.includes(file.type)) {
            alert("Only JPG, PNG or PDF files are allowed!");
            return false;
        }

        // Max size 2MB
        if (file.size > 2 * 1024 * 1024) {
            alert("File size must be less than 2MB!");
            return false;
        }
    }

    return true;
}
</script>

{% endblock %}
